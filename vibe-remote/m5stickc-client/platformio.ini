[platformio]
default_envs = m5stickc-plus2-vibe-min

[env:m5stickc-plus2-vibe-min]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
monitor_filters = time, colorize
board_build.partitions = huge_app.csv
extra_scripts = pre:scripts/apply_local_config.py

lib_deps =
  m5stack/M5Unified @ ^0.2.2
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.2.0

build_flags =
  -D VIBE_DEVICE_NAME=\"M5StickC-Plus2-Vibe-Min\"
  -D VIBE_SERVICE_TYPE=\"vibe-remote\"
  ; Usually the app discovers the Windows / Local bridge via _vibe-remote._tcp.local.
  ; Set VIBE_REMOTE_HOST only when mDNS is unavailable on the network.
  ; -D VIBE_REMOTE_HOST=\"192.168.1.10\"
  ; -D VIBE_REMOTE_PORT=39271
