name: "Vibe Remote Wokwi buttons"
version: 1
author: "Gapless Agent Runtime"

steps:
  - wait-serial: "vibe minimal boot"
  - set-control:
      part-id: btnA
      control: pressed
      value: 1
  - wait-serial: "btn: A1 B0 P0"
  - delay: 100ms
  - set-control:
      part-id: btnA
      control: pressed
      value: 0
  - wait-serial: "btn: A0 B0 P0"
  - set-control:
      part-id: btnB
      control: pressed
      value: 1
  - wait-serial: "btn: A0 B1 P0"
  - delay: 100ms
  - set-control:
      part-id: btnB
      control: pressed
      value: 0
  - wait-serial: "btn: A0 B0 P0"
