[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
monitor_speed = 115200
monitor_filters = time, colorize
extra_scripts = pre:scripts/apply_local_config.py

; 必要に応じてボードを変更: m5stack-core-esp32, m5stack-fire など
lib_deps =
  m5stack/M5Unified @ ^0.2.2
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.2.0

build_flags =
  -D VIBE_DEVICE_NAME=\"M5Stack\"
  -D VIBE_SERVICE_TYPE=\"vibe-remote\"
  ; Core2などBluetooth Classic SPP対応機種でWi-FiではなくSPPを使う場合:
  ; -D VIBE_TRANSPORT_SPP=1
  ; mDNSが使えないネットワークでは、PCのIPを入れると直接接続できます。
  ; -D VIBE_REMOTE_HOST=\"192.168.1.10\"
  ; -D VIBE_REMOTE_PORT=39271

[env:m5stickc-plus2-vibe-min]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
monitor_filters = time, colorize
board_build.partitions = huge_app.csv
extra_scripts = pre:scripts/apply_local_config.py
build_src_filter =
  +<minimal_vibe_remote.cpp>
  -<main.cpp>

lib_deps =
  m5stack/M5Unified @ ^0.2.2
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.2.0

build_flags =
  -D VIBE_DEVICE_NAME=\"M5StickC-Plus2-Vibe-Min\"
  -D VIBE_SERVICE_TYPE=\"vibe-remote\"
  ; 通常は Windows / Local bridge が advertise する _vibe-remote._tcp.local を探索します。
  ; mDNS が使えない場合だけ fallback として PC / Local bridge のIPを指定します。
  ; -D VIBE_REMOTE_HOST=\"192.168.1.10\"
  ; -D VIBE_REMOTE_PORT=39271
