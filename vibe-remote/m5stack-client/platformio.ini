[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
monitor_speed = 115200

; 必要に応じてボードを変更: m5stack-core-esp32, m5stack-fire など
lib_deps =
  m5stack/M5Unified @ ^0.2.2
  links2004/WebSockets @ ^2.6.1
  bblanchon/ArduinoJson @ ^7.2.0

build_flags =
  -D VIBE_WIFI_SSID=\"YOUR_WIFI_SSID\"
  -D VIBE_WIFI_PASS=\"YOUR_WIFI_PASS\"
  -D VIBE_REMOTE_TOKEN=\"REPLACE_WITH_VIBE_TOKEN\"
  -D VIBE_SERVICE_TYPE=\"vibe-remote\"
